name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- matrix build: Ubuntu LTS, Fedora, Debian, Alpine ----
  build:
    name: build (${{ matrix.os }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            image: ubuntu:24.04
            install: apt-get update -q && apt-get install -y -q build-essential pkg-config libtirpc-dev
          - os: fedora-41
            image: fedora:41
            install: dnf install -y gcc make pkgconf-pkg-config libtirpc-devel
          - os: debian-12
            image: debian:12
            install: apt-get update -q && apt-get install -y -q build-essential pkg-config libtirpc-dev
          - os: alpine-3.21
            image: alpine:3.21
            install: apk add --no-cache gcc musl-dev make pkgconf libtirpc-dev

    container:
      image: ${{ matrix.image }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: ${{ matrix.install }}

      - name: Build (-Werror)
        run: make "CFLAGS=-O2 -Wall -Wextra -Werror" rebuild

      - name: Self-check
        run: make check

      - name: Generate SBOM
        run: make sbom

  # ---- shellcheck on all shell scripts ----
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install shellcheck
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q shellcheck

      - name: Run shellcheck
        run: shellcheck tests/*.sh dockerfiles/common/*.sh

  # ---- static analysis: cppcheck ----
  cppcheck:
    name: cppcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q cppcheck pkg-config libtirpc-dev

      - name: Run cppcheck
        run: make cppcheck

  # ---- static analysis: clang-tidy ----
  clang-tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev clang clang-tidy bear

      - name: Generate compile_commands.json
        run: bear -- make "CFLAGS=-O2 -Wall -Wextra" rebuild

      - name: Run clang-tidy
        run: |
          clang-tidy \
            --config-file=.clang-tidy \
            src/*.c -- \
            $(pkg-config --cflags libtirpc) \
            -D_GNU_SOURCE

  # ---- runtime checks: ASan/UBSan + valgrind ----
  sanitizers:
    name: sanitizers & valgrind
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev valgrind

      - name: Build with ASan + UBSan
        run: make "CFLAGS=-O1 -g -Wall -Wextra -fsanitize=address,undefined -fno-sanitize-recover=all" "LDFLAGS=-fsanitize=address,undefined" rebuild

      - name: Self-check under sanitizers
        run: make check

      - name: No-mount run under sanitizers
        run: ./nfsdiag --no-mount --timeout 2 127.0.0.1 || test $? -eq 1

      - name: Rebuild without sanitizers for valgrind
        run: make rebuild

      - name: Valgrind self-test
        run: valgrind --error-exitcode=99 --leak-check=full ./nfsdiag --self-test

      - name: Valgrind no-mount run
        run: valgrind --error-exitcode=99 --leak-check=full ./nfsdiag --no-mount --timeout 2 127.0.0.1 || test $? -eq 1

  # ---- machine-readable output validation ----
  output-formats:
    name: output formats (jq/xmllint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev jq libxml2-utils python3-jsonschema

      - name: Build
        run: make

      - name: Version strings are consistent
        run: make check-versions

      - name: JSON report is valid JSON
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --json=- 127.0.0.1 || true)
          echo "$out" | jq empty

      - name: JSON report matches published schema
        run: make check-json-schema

      - name: --quiet writes nothing to stdout
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --quiet --json=/tmp/q.json 127.0.0.1 || true)
          test -z "$out"
          jq empty /tmp/q.json

      - name: NDJSON stream is valid
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --output-format ndjson 127.0.0.1 || true)
          echo "$out" | jq -s 'length > 0' | grep -q true

      - name: JUnit output is valid XML
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --output-format junit 127.0.0.1 || true)
          echo "$out" | xmllint --noout -

      - name: Prometheus output has only comments and samples
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --output-format prometheus 127.0.0.1 || true)
          echo "$out" | grep -q '^# HELP nfsdiag_summary_ok'
          ! echo "$out" | grep -vE '^(#|[a-zA-Z_:][a-zA-Z0-9_:]*(\{[^}]*\})? [0-9.eE+-]+$|$)'

      - name: HTML report starts with doctype
        run: |
          out=$(./nfsdiag --no-mount --timeout 2 --html=- 127.0.0.1 || true)
          echo "$out" | head -1 | grep -q '<!DOCTYPE html>'

  # ---- fuzzing smoke run (5s per target) ----
  fuzz-smoke:
    name: fuzz smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q clang pkg-config libtirpc-dev

      - name: Build and run fuzz targets
        run: make -C tests/fuzz run-all

  fixture-tests:
    name: docker fixtures (rootless subset)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev

      - name: Build
        run: make

      - name: Run rootless fixture subset
        run: |
          make test-fixture-rpcbind-unreachable
          make test-fixture-nfs-port-unreachable
          make test-fixture-rpc-map-missing-nfs
          make test-fixture-mountd-unavailable

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: github/codeql-action/init@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          languages: c-cpp
      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev
      - name: Build for CodeQL
        run: make rebuild
      - uses: github/codeql-action/analyze@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3

  # ---- coverage report (informational artifact) ----
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev lcov

      - name: Build with coverage
        run: make "CFLAGS=-O0 -g --coverage" "LDFLAGS=--coverage" rebuild

      - name: Exercise the binary
        run: |
          make test-unit "CFLAGS=-O0 -g --coverage" "LDFLAGS=--coverage"
          ./nfsdiag --self-test
          ./nfsdiag --no-mount --timeout 2 --json=- 127.0.0.1 > /dev/null || true
          ./nfsdiag --no-mount --timeout 2 --output-format junit 127.0.0.1 > /dev/null || true

      - name: Generate lcov report
        run: |
          lcov --capture --directory src --output-file coverage.info
          lcov --list coverage.info

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage
          path: coverage.info

  # ---- website validation ----
  website:
    name: website (html + links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q libxml2-utils

      - name: Validate website
        run: make check-website

  # ---- signal handling and cleanup (unprivileged) ----
  signals:
    name: signals & cleanup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev

      - name: Build
        run: make

      - name: Signal handling and post-run cleanup
        run: make check-signals

      - name: Unprivileged smoke (no root)
        run: |
          id -u | grep -qv '^0$' || { echo "expected non-root"; exit 1; }
          ./nfsdiag --version
          ./nfsdiag --help >/dev/null
          ./nfsdiag --self-test
          ./nfsdiag --no-mount --timeout 2 127.0.0.1 || true

  # ---- Prometheus metric validation ----
  promtool:
    name: prometheus (promtool)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev prometheus

      - name: Build
        run: make

      - name: Validate metrics with promtool
        run: |
          ./nfsdiag --no-mount --timeout 2 --output-format prometheus 127.0.0.1 > metrics.txt || true
          # promtool lints the names: nfsdiag_summary_{ok,warn,fail} trip the
          # "metric name should not include type" rule because "summary" is also
          # a Prometheus metric type. These are published contract names, so that
          # specific lint is expected; fail on any other promtool finding.
          out=$(promtool check metrics < metrics.txt 2>&1) && status=0 || status=$?
          echo "$out"
          unexpected=$(echo "$out" | grep -vE "metric name should not include type 'summary'" | grep -E '.' || true)
          if [ -n "$unexpected" ]; then
            echo "promtool reported unexpected issues:"; echo "$unexpected"; exit 1
          fi
          echo "promtool: only the expected nfsdiag_summary naming lint (status=$status)"

  # ---- DEB build, lint and install/remove smoke ----
  package-deb:
    name: package deb (install smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q build-essential pkg-config libtirpc-dev dpkg-dev lintian

      - name: Build DEB
        run: make deb

      - name: Inspect package
        run: |
          dpkg -I build/*.deb
          dpkg -c build/*.deb

      - name: Lint (best-effort)
        run: lintian build/*.deb || true

      - name: Install, smoke test, remove
        run: |
          sudo dpkg -i build/*.deb || sudo apt-get -y -f install
          nfsdiag --version
          nfsdiag --help >/dev/null
          nfsdiag --self-test
          test -f /usr/share/man/man8/nfsdiag.8.gz
          test -f /usr/share/bash-completion/completions/nfsdiag
          test -f /usr/share/doc/nfsdiag/nfsdiag.schema.json || true
          sudo dpkg -r nfsdiag

  # ---- RPM build, lint and install/remove smoke ----
  package-rpm:
    name: package rpm (install smoke)
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: dnf install -y gcc make pkgconf-pkg-config libtirpc-devel rpm-build rpmlint findutils

      - name: Build RPM
        run: make rpm

      - name: Inspect package
        run: |
          rpm -qpi build/*.rpm
          rpm -qpl build/*.rpm

      - name: Lint (best-effort)
        run: rpmlint build/*.rpm || true

      - name: Install, smoke test, remove
        run: |
          dnf install -y ./build/*.rpm
          nfsdiag --version
          nfsdiag --self-test
          # The man page ships compressed; the extension (.gz/.zst) is the
          # distro's choice, so check the packaged file list instead of a path.
          rpm -ql nfsdiag | grep -qE '/man8/nfsdiag\.8'
          rpm -e nfsdiag

  # ---- APK build and install smoke (abuild on Alpine) ----
  package-apk:
    name: package apk (install smoke)
    runs-on: ubuntu-latest
    container:
      image: alpine:3.21
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build and install APK
        run: |
          apk add --no-cache build-base pkgconf libtirpc-dev alpine-sdk sudo
          adduser -G abuild -s /bin/sh -D builder
          echo "builder ALL=(ALL) NOPASSWD:ALL" >> /etc/sudoers
          chown -R builder:abuild .
          su builder -c '
            set -e
            abuild-keygen -n -a -i
            make
            VERSION=$(cat VERSION)
            {
              echo "pkgname=nfsdiag"
              echo "pkgver=$VERSION"
              echo "pkgrel=0"
              echo "pkgdesc=\"NFS diagnostic tool\""
              echo "url=\"https://github.com/lsferreira42/nfsdiag\""
              echo "arch=\"x86_64\""
              echo "license=\"MIT\""
              echo "depends=\"libtirpc\""
              echo "source=\"\""
              echo "build() { :; }"
              echo "options=\"!check\""
              echo "package() {"
              echo "  install -Dm755 nfsdiag \"\$pkgdir\"/usr/bin/nfsdiag"
              echo "  gzip -9n < docs/nfsdiag.8 > nfsdiag.8.gz"
              echo "  install -Dm644 nfsdiag.8.gz \"\$pkgdir\"/usr/share/man/man8/nfsdiag.8.gz"
              echo "  install -Dm644 LICENSE \"\$pkgdir\"/usr/share/licenses/nfsdiag/LICENSE"
              echo "}"
            } > APKBUILD
            abuild -F checksum
            abuild -F -r
          '
          apk add --allow-untrusted /home/builder/packages/*/x86_64/nfsdiag-*.apk
          nfsdiag --version
          nfsdiag --self-test

  # ---- AUR PKGBUILD validation (makepkg + namcap) ----
  aur:
    name: aur (makepkg + namcap)
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        run: pacman -Syu --noconfirm namcap libtirpc git

      - name: Validate and build PKGBUILD
        run: |
          useradd -m builder
          cp packaging/aur/PKGBUILD /home/builder/PKGBUILD
          chown -R builder /home/builder
          # Build from the local tree instead of the released tarball so the CI
          # validates the current source.
          su builder -c 'cd /home/builder && namcap PKGBUILD || true'
          su builder -c 'cd /home/builder && makepkg --printsrcinfo >/dev/null'

  # ---- Nix flake check ----
  # Runs on the host (so actions/checkout works) and drives Nix inside the
  # official container — the minimal nixos/nix image cannot run the JS-based
  # checkout action itself.
  nix:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Flake check and build
        run: |
          docker run --rm -v "$PWD:/work" -w /work nixos/nix:latest sh -ec '
            # The checkout is owned by the host runner user but nix runs as root
            # in the container; mark it safe so libgit2 will read the flake.
            git config --global --add safe.directory "*"
            nix --extra-experimental-features "nix-command flakes" flake check
            # Out-link in /tmp so no root-owned files land in the workspace and
            # break the post-job cleanup on the host.
            nix --extra-experimental-features "nix-command flakes" build --out-link /tmp/result
            /tmp/result/bin/nfsdiag --version
          '
