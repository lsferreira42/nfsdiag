name: Release

on:
  push:
    tags: ['v*']

jobs:
  # ---- linux-amd64 binary ----
  binary-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libtirpc-dev

      - name: Build linux-amd64
        run: |
          make "CFLAGS=-O2 -Wall -Wextra -Werror" rebuild
          make sbom
          mkdir -p dist
          cp nfsdiag dist/nfsdiag-linux-amd64
          sha256sum dist/nfsdiag-linux-amd64 > dist/nfsdiag-linux-amd64.sha256
          cp build/*.spdx.json dist/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-amd64
          path: dist/

  # ---- linux-arm64 cross-compiled binary ----
  binary-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install cross-compile toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu pkg-config

      - name: Install libtirpc (arm64) via multiarch
        run: |
          sudo dpkg --add-architecture arm64
          codename=$(. /etc/os-release && echo "$VERSION_CODENAME")
          # The stock Ubuntu mirrors serve only amd64/i386, so pin them to
          # amd64; otherwise apt-get update 404s fetching the arm64 indices.
          # arm64 packages live on ports.ubuntu.com.
          sudo sed -i 's/^Types: deb$/Architectures: amd64\nTypes: deb/' \
            /etc/apt/sources.list.d/ubuntu.sources
          printf 'Types: deb\nURIs: http://ports.ubuntu.com/ubuntu-ports/\nSuites: %s %s-updates %s-backports %s-security\nComponents: main universe restricted multiverse\nArchitectures: arm64\nSigned-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg\n' \
            "$codename" "$codename" "$codename" "$codename" \
            | sudo tee /etc/apt/sources.list.d/arm64-ports.sources >/dev/null
          sudo apt-get update
          sudo apt-get install -y libtirpc-dev:arm64

      - name: Build linux-arm64
        run: |
          make "CC=aarch64-linux-gnu-gcc" \
               "CFLAGS=-O2 -Wall -Wextra -Werror" \
               "TIRPC_CFLAGS=-I/usr/include/tirpc" \
               "TIRPC_LIBS=-ltirpc" \
               rebuild
          mkdir -p dist
          cp nfsdiag dist/nfsdiag-linux-arm64
          sha256sum dist/nfsdiag-linux-arm64 > dist/nfsdiag-linux-arm64.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: binary-arm64
          path: dist/

  # ---- DEB package ----
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libtirpc-dev

      - name: Build DEB
        run: make deb

      - name: Checksum
        run: sha256sum build/*.deb > build/checksums-deb.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: deb
          path: build/*.deb

  # ---- RPM package ----
  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:41
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install build dependencies
        run: dnf install -y gcc make pkgconf-pkg-config libtirpc-devel rpm-build

      - name: Build RPM
        run: make rpm

      - name: Checksum
        run: sha256sum build/*.rpm > build/checksums-rpm.sha256

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rpm
          path: build/*.rpm

  # ---- Alpine APK package ----
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build APK
        run: make apk

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: apk
          path: build/*.apk

  # ---- OCI image published to ghcr.io ----
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/lsferreira42/nfsdiag
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        env:
          # Skip the auto-uploaded *.dockerbuild build-record artifact; the
          # release job downloads all run artifacts and would choke on it.
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: packaging/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---- GitHub Release ----
  release:
    needs: [binary-amd64, binary-arm64, build-deb, build-rpm, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          # Only the release artifacts; never the docker build-record artifact.
          pattern: '{binary-*,deb,rpm,apk}'
          merge-multiple: true
          path: dist

      - name: Generate combined checksums
        run: |
          cd dist
          sha256sum nfsdiag-linux-amd64 nfsdiag-linux-arm64 *.deb *.rpm *.apk 2>/dev/null | tee SHA256SUMS || true

      - name: Generate provenance
        run: |
          {
            echo "repository=${GITHUB_REPOSITORY}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "actor=${GITHUB_ACTOR}"
          } > dist/PROVENANCE.txt

      # Signed, verifiable provenance (Sigstore) for every binary and package:
      # verify with `gh attestation verify <file> --repo lsferreira42/nfsdiag`.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: |
            dist/nfsdiag-linux-amd64
            dist/nfsdiag-linux-arm64
            dist/*.deb
            dist/*.rpm
            dist/*.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist/nfsdiag-linux-amd64
            dist/nfsdiag-linux-arm64
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/*.spdx.json
            dist/SHA256SUMS
            dist/PROVENANCE.txt
          generate_release_notes: true
