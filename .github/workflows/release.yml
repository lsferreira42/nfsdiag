name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libtirpc-dev

      - name: Build DEB
        run: make deb

      - uses: actions/upload-artifact@v4
        with:
          name: deb
          path: build/*.deb

  build-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:40
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: dnf install -y gcc make pkgconf-pkg-config libtirpc-devel rpm-build

      - name: Build RPM
        run: make rpm

      - uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: build/*.rpm

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: make apk

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: build/*.apk

  release:
    needs: [build-deb, build-rpm, build-apk]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: build

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: build/*
          generate_release_notes: true
